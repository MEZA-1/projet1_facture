{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Modify Product Stock</h2>
    <form method="POST" class="needs-validation" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label for="product">Product</label>
            <select class="form-control" id="product" name="product" required>
                <option value="" disabled selected hidden>Choose a product ...</option>
                {% for product in products %}
                <option value="{{ product.id }}">
                    {{ product.name }} (Stock: {{ product.quantity_in_stock }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="quantity_stock">New Quantity in Stock</label>
            <input type="number" required class="form-control" id="quantity_stock" name="quantity_stock" required>
        </div>
        <button type="submit" class="btn btn-primary">Update Stock</button>
    </form>
</div>
{% endblock %}
